{{- if .Values.victoriaMetrics.enabled }}
{{- $persistence := .Values.victoriaMetrics.persistence | default dict }}
{{- $persistenceType := $persistence.type | default "storageClass" }}
{{- $persistencePath := $persistence.path | default "" }}
{{- $useHostPath := and $persistence.enabled (eq $persistenceType "hostpath") }}
{{- if and $useHostPath (empty $persistencePath) }}
{{- fail "victoriaMetrics.persistence.path is required when victoriaMetrics.persistence.type=hostpath" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wp-monitor.componentFullname" (dict "context" . "name" "victoria-metrics") }}
  labels:
    {{- include "wp-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: victoria-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "wp-monitor.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: victoria-metrics
  template:
    metadata:
      labels:
        {{- include "wp-monitor.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: victoria-metrics
    spec:
      {{- with .Values.victoriaMetrics.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: victoria-metrics
          image: "{{ .Values.victoriaMetrics.image.repository }}:{{ .Values.victoriaMetrics.image.tag }}"
          imagePullPolicy: {{ .Values.victoriaMetrics.image.pullPolicy }}
          args:
            - --envflag.enable
            - --envflag.prefix=VM_
            - --loggerFormat=json
            - --retentionPeriod={{ .Values.global.retentionPeriod }}
            - --storageDataPath=/storage
            - -search.latencyOffset=0s
          env:
            - name: TZ
              value: {{ .Values.global.timezone | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.victoriaMetrics.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 10
          {{- with .Values.victoriaMetrics.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if .Values.victoriaMetrics.persistence.enabled }}
          volumeMounts:
            - name: storage
              mountPath: /storage
          {{- end }}
      {{- if .Values.victoriaMetrics.persistence.enabled }}
      volumes:
        - name: storage
          {{- if $useHostPath }}
          hostPath:
            path: {{ $persistencePath | quote }}
            type: DirectoryOrCreate
          {{- else }}
          persistentVolumeClaim:
            claimName: {{ include "wp-monitor.componentFullname" (dict "context" . "name" "victoria-metrics-data") }}
          {{- end }}
      {{- end }}
{{- end }}
