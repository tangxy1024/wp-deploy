{{- if and .Values.victoriaMetrics.enabled .Values.victoriaMetrics.persistence.enabled (ne (.Values.victoriaMetrics.persistence.type | default "storageClass") "hostpath") }}
{{- $storageClass := .Values.victoriaMetrics.persistence.storageClass | default dict }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "wp-monitor.componentFullname" (dict "context" . "name" "victoria-metrics-data") }}
  labels:
    {{- include "wp-monitor.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml $storageClass.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ $storageClass.size }}
  {{- with $storageClass.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
