{{- if .Values.wpMonitor.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "wp-monitor.componentFullname" (dict "context" . "name" "wp-monitor") }}
  labels:
    {{- include "wp-monitor.labels" . | nindent 4 }}
    app.kubernetes.io/component: wp-monitor
spec:
  type: {{ .Values.wpMonitor.service.type }}
  ports:
    - name: http
      port: {{ .Values.wpMonitor.service.port }}
      targetPort: http
      protocol: TCP
      {{- if and (eq .Values.wpMonitor.service.type "NodePort") .Values.wpMonitor.service.nodePort }}
      nodePort: {{ .Values.wpMonitor.service.nodePort }}
      {{- end }}
  selector:
    {{- include "wp-monitor.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: wp-monitor
{{- end }}
