apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-station-gitea
  labels:
    helm.sh/chart: station-0.1.0
    app.kubernetes.io/name: station
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "0.1.6-alpha"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: gitea
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: station
      app.kubernetes.io/instance: test
      app.kubernetes.io/component: gitea
  template:
    metadata:
      labels:
        helm.sh/chart: station-0.1.0
        app.kubernetes.io/name: station
        app.kubernetes.io/instance: test
        app.kubernetes.io/version: "0.1.6-alpha"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: gitea
    spec:
      containers:
        - name: gitea
          image: "gitea/gitea:latest"
          imagePullPolicy: IfNotPresent
          env:
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
            - name: GITEA__database__DB_TYPE
              value: postgres
            - name: GITEA__database__HOST
              value: "test-station-postgres:5432"
            - name: GITEA__database__NAME
              value: "gitea"
            - name: GITEA__database__USER
              value: "postgres"
            - name: GITEA__database__PASSWD
              valueFrom:
                secretKeyRef:
                  name: test-station-secret
                  key: postgres-password
            - name: GITEA__database__SSL_MODE
              value: disable
            - name: GITEA__server__DOMAIN
              value: "localhost"
            - name: GITEA__server__ROOT_URL
              value: "http://localhost:3000"
            - name: GITEA__server__HTTP_PORT
              value: "3000"
            - name: GITEA__server__SSH_DOMAIN
              value: "localhost"
            - name: GITEA__server__SSH_PORT
              value: "222"
            - name: GITEA__server__DISABLE_SSH
              value: "false"
            - name: GITEA__security__INSTALL_LOCK
              value: "true"
            - name: GITEA__service__DISABLE_REGISTRATION
              value: "true"
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
            - name: ssh
              containerPort: 22
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
          livenessProbe:
            httpGet:
              path: /
              port: http
          volumeMounts:
            - name: gitea-data
              mountPath: /data
      volumes:
        - name: gitea-data
          hostPath:
            path: "/data/gitea"
            type: DirectoryOrCreate
      nodeSelector:
        kubernetes.io/hostname: dayu01.shmh.dysec
