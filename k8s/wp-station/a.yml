# Source: station/templates/postgres-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-station-postgres
  labels:
    helm.sh/chart: station-0.1.0
    app.kubernetes.io/name: station
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "0.1.6-alpha"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: station
      app.kubernetes.io/instance: test
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        helm.sh/chart: station-0.1.0
        app.kubernetes.io/name: station
        app.kubernetes.io/instance: test
        app.kubernetes.io/version: "0.1.6-alpha"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: "postgres:18.3"
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_DB
              value: "postgres"
            - name: POSTGRES_USER
              value: "postgres"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: test-station-secret
                  key: postgres-password
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U postgres -d postgres
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U postgres -d postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql
            - name: initdb
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
      volumes:
        - name: postgres-data
          hostPath:
            path: "/data/postgres"
            type: DirectoryOrCreate
        - name: initdb
          configMap:
            name: test-station-initdb
      nodeSelector:
        kubernetes.io/hostname: dayu01.shmh.dysec
