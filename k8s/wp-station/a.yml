# Source: station/templates/station-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-station
  labels:
    helm.sh/chart: station-0.1.0
    app.kubernetes.io/name: station
    app.kubernetes.io/instance: test
    app.kubernetes.io/version: "0.1.6-alpha"
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/component: station
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: station
      app.kubernetes.io/instance: test
      app.kubernetes.io/component: station
  template:
    metadata:
      annotations:
        checksum/config: f3ec52c9ef3b033a8f5c6009a443a364a46da5062e30530cfdde68ca369303d9
        checksum/secret: a69b26fc6cd92119297bff894d4abd89455c148bdb9fc2f75cebe52db24f01fc
      labels:
        helm.sh/chart: station-0.1.0
        app.kubernetes.io/name: station
        app.kubernetes.io/instance: test
        app.kubernetes.io/version: "0.1.6-alpha"
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/component: station
    spec:
      serviceAccountName: test-station
      initContainers:
        - name: warp-toolchain
          image: "ghcr.io/wp-labs/warp-parse-exp:exp-v0.23.6-12-alpha"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              cp -f /usr/local/bin/wparse /toolchain/wparse && chmod +x /toolchain/wparse
              cp -f /usr/local/bin/wpgen /toolchain/wpgen && chmod +x /toolchain/wpgen
              cp -f /usr/local/bin/wproj /toolchain/wproj && chmod +x /toolchain/wproj
          volumeMounts:
            - name: toolchain
              mountPath: /toolchain
        - name: wait-deps
          image: "busybox:1.36"
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -e
              until nc -z test-station-postgres 5432; do
                echo "waiting for postgres"
                sleep 5
              done
              until wget -qO- http://test-station-gitea:3000 >/dev/null 2>&1; do
                echo "waiting for gitea"
                sleep 5
              done
        - name: init-gitea-admin
          image: "gitea/gitea:latest"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              until wget -qO- http://test-station-gitea:3000 >/dev/null 2>&1; do
                echo "waiting for gitea"
                sleep 5
              done
              mkdir -p /tmp/gitea-init
              cat > /tmp/gitea-init/app.ini <<EOF
              APP_NAME = Gitea
              RUN_MODE = prod

              [database]
              DB_TYPE = postgres
              HOST = test-station-postgres:5432
              NAME = gitea
              USER = postgres
              PASSWD = ${POSTGRES_PASSWORD}
              SSL_MODE = disable

              [security]
              INSTALL_LOCK = true

              [server]
              DOMAIN = localhost
              ROOT_URL = http://localhost:3000
              HTTP_PORT = 3000
              SSH_DOMAIN = localhost
              SSH_PORT = 222
              DISABLE_SSH = false

              [service]
              DISABLE_REGISTRATION = true
              EOF
              chown -R git:git /tmp/gitea-init
              if su-exec git gitea admin user list --config /tmp/gitea-init/app.ini | grep -qE '^[[:space:]]*[0-9]+[[:space:]]+gitea[[:space:]]'; then
                echo "gitea admin user exists, resetting password"
                su-exec git gitea admin user change-password \
                  --config /tmp/gitea-init/app.ini \
                  --username "gitea" \
                  --password "$GITEA_ADMIN_PASSWORD" \
                  --must-change-password=false
              else
                echo "creating gitea admin user"
                su-exec git gitea admin user create \
                  --config /tmp/gitea-init/app.ini \
                  --username "gitea" \
                  --password "$GITEA_ADMIN_PASSWORD" \
                  --email gitea@localhost \
                  --admin \
                  --must-change-password=false
              fi
              until curl -fsS \
                -u "gitea:$GITEA_ADMIN_PASSWORD" \
                http://test-station-gitea:3000/api/v1/user >/dev/null 2>&1; do
                echo "waiting for gitea admin auth"
                sleep 5
              done
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: test-station-secret
                  key: postgres-password
            - name: GITEA_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: test-station-secret
                  key: gitea-admin-password
      containers:
        - name: station
          securityContext:
            runAsGroup: 0
            runAsUser: 0
          image: "ghcr.io/wp-labs/wp-station:v0.1.12-alpha"
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
          args:
            - |
              git config --global user.name "WarpStation"
              git config --global user.email "station@warpparse.local"
              exec /app/wp-station
          env:
            - name: TZ
              value: "Asia/Shanghai"
            - name: WP_STATION__WEB__HOST
              value: "0.0.0.0"
            - name: WP_STATION__WEB__PORT
              value: "8081"
            - name: WP_STATION__DATABASE__HOST
              value: "test-station-postgres"
            - name: WP_STATION__DATABASE__PORT
              value: "5432"
            - name: WP_STATION__DATABASE__NAME
              value: "wp-station"
            - name: WP_STATION__DATABASE__USERNAME
              value: "postgres"
            - name: WP_STATION__DATABASE__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: test-station-secret
                  key: postgres-password
            - name: WP_STATION__GITEA__BASE_URL
              value: "http://test-station-gitea:3000"
            - name: WP_STATION__GITEA__USERNAME
              value: "gitea"
            - name: WP_STATION__GITEA__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: test-station-secret
                  key: gitea-admin-password
            - name: WP_STATION__FEATURES__DATA_COLLECT_URL
              value: "http://wp-monitor:18080/wp-monitor"
            - name: WP_STATION__PROJECT_ROOT
              value: "project_root"
          ports:
            - name: http
              containerPort: 8081
              protocol: TCP
          volumeMounts:
            - name: station-config
              mountPath: /app/config/config.toml
              subPath: config.toml
              readOnly: true
            - name: station-config
              mountPath: /app/tls/CA.crt
              subPath: CA.crt
              readOnly: true
            - name: default-configs
              mountPath: /app/default_configs
              readOnly: true
            - name: toolchain
              mountPath: /app/toolchain
              readOnly: true
            - mountPath: /etc/localtime
              name: host-time
              readOnly: true
      volumes:
        - name: station-config
          configMap:
            name: test-station-config
        - hostPath:
            path: /etc/localtime
            type: File
          name: host-time
        - name: default-configs
          hostPath:
            path: "/root/wp-stack/product/default-configs"
            type: DirectoryOrCreate
        - name: toolchain
          emptyDir: {}
      nodeSelector:
        kubernetes.io/hostname: dayu01.shmh.dysec
