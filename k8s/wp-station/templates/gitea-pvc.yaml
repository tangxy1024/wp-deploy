{{- if and .Values.gitea.persistence.enabled (ne (.Values.gitea.persistence.type | default "storageClass") "hostpath") }}
{{- $storageClass := .Values.gitea.persistence.storageClass | default dict }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "station.giteaPvcName" . }}
  labels:
    {{- include "station.labels" . | nindent 4 }}
spec:
  accessModes:
    {{- toYaml $storageClass.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ $storageClass.size }}
  {{- with $storageClass.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
{{- end }}
