replicaCount: 1

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

station:
  web:
    host: 0.0.0.0
    port: 8081
  log:
    level: info
  git:
    userName: WarpStation
    userEmail: station@warpparse.local
  defaultConfigs:
    type: hostpath
    path: "/root/wp-stack/product/default-configs"
  service:
    type: NodePort
    port: 8081
    nodePort: 30881
  nodeSelector:
    kubernetes.io/hostname: dayu01.shmh.dysec
  # 镜像相关配置项
  image:
    repository: ghcr.io/wp-labs/wp-station
    pullPolicy: IfNotPresent
    tag: "v0.1.15-alpha"
  toolchainImage:
    repository: ghcr.io/wp-labs/warp-parse-exp
    pullPolicy: IfNotPresent
    tag: "exp-v0.25.1-12-alpha"
  initImage:
    repository: busybox
    pullPolicy: IfNotPresent
    tag: "1.36"
  # 本地启动目录
  configMountPath: /app/config/config.toml
  defaultConfigsMountPath: /app/default_configs
  toolchainMountPath: /app/toolchain
  # env相关配置
  monitorUrl: http://wp-monitor:18080/wp-monitor
  assistBaseUrl: ""
  projectRoot: project_root
  env: []
  envFrom: []
  timezone:
    enabled: true
    name: Asia/Shanghai
  # pod和资源相关配置
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext:
    runAsUser: 0
    runAsGroup: 0
  resources: {}
  livenessProbe: {}
  readinessProbe: {}
  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
  volumes:
    - name: host-time
      hostPath:
        path: /etc/localtime
        type: File
  volumeMounts:
    - name: host-time
      mountPath: /etc/localtime
      readOnly: true
  # volumes: []
  # volumeMounts: []
  tolerations: []
  affinity: {}

postgres:
  image:
    repository: postgres
    tag: "18.3"
    pullPolicy: IfNotPresent
  service:
    port: 5432
  persistence:
    enabled: true
    type: hostpath
    path: "/data/postgres"
  nodeSelector:
    kubernetes.io/hostname: dayu01.shmh.dysec
  user: postgres
  password: "123456"
  databases:
    default: postgres
    gitea: gitea
    station: wp-station
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  resources: {}
  livenessProbe: {}
  readinessProbe: {}
  volumes: []
  volumeMounts: []
  tolerations: []
  affinity: {}

gitea:
  image:
    repository: gitea/gitea
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    httpPort: 3000
    sshPort: 22
  persistence:
    enabled: true
    type: hostpath
    path: "/data/gitea"
  nodeSelector:
    kubernetes.io/hostname: dayu01.shmh.dysec

  # gitea自身配置
  adminUsername: gitea
  adminPassword: "123456"
  rootUrl: http://localhost:3000
  domain: localhost
  sshDomain: localhost
  sshExternalPort: 222
  userUid: "1000"
  userGid: "1000"
  podAnnotations: {}
  podLabels: {}
  podSecurityContext: {}
  securityContext: {}
  resources: {}
  livenessProbe: {}
  readinessProbe: {}
  volumes: []
  volumeMounts: []
  tolerations: []
  affinity: {}
