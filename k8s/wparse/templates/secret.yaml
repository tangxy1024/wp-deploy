{{- if and .Values.warpParseSecret.create (not .Values.warpParseSecret.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wparse.warpParseSecretName" . }}
  labels:
    {{- include "wparse.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $token := .Files.Get .Values.warpParseSecret.tokenPath }}
  {{- if not $token }}
  {{- fail (printf "admin token file not found or empty: %s" .Values.warpParseSecret.tokenPath) }}
  {{- end }}
  admin_api.token: |-
{{ $token | indent 4 }}
  {{- if .Values.warpParseSecret.tls.enabled }}
  {{- $crt := .Files.Get .Values.warpParseSecret.tls.crtPath }}
  {{- $key := .Files.Get .Values.warpParseSecret.tls.keyPath }}
  {{- if not $crt }}
  {{- fail (printf "TLS cert file not found or empty: %s" .Values.warpParseSecret.tls.crtPath) }}
  {{- end }}
  {{- if not $key }}
  {{- fail (printf "TLS key file not found or empty: %s" .Values.warpParseSecret.tls.keyPath) }}
  {{- end }}
  tls.crt: |-
{{ $crt | indent 4 }}
  tls.key: |-
{{ $key | indent 4 }}
  {{- end }}
{{- end }}
